<div class="pdr_settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Pokémon RPG Dice Roller</b>
            <div class="inline-drawer-icon fa-solid interactable up fa-circle-chevron-up" tabindex="0"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="marginBot5">
                <label class="checkbox_label" for="pdr_auto_detect">
                    <input id="pdr_auto_detect" type="checkbox">
                    <span>Auto-detect [ROLL], [AUTO-RESOLVE], [SUBMIT] in messages</span>
                </label>
            </div>
            <div class="marginBot5">
                <label class="checkbox_label" for="pdr_function_tool">
                    <input id="pdr_function_tool" type="checkbox">
                    <span>Enable function tool (AI can roll dice)</span>
                    <a rel="noopener" href="https://docs.sillytavern.app/for-contributors/function-calling/" class="notes-link" target="_blank">
                        <span class="note-link-span">?</span>
                    </a>
                </label>
            </div>
            <div class="marginBot5">
                <label class="checkbox_label" for="pdr_show_details">
                    <input id="pdr_show_details" type="checkbox">
                    <span>Show individual roll details in chat</span>
                </label>
            </div>
            <div class="marginBot5">
                <label for="pdr_default_formula">
                    <span>Default formula</span>
                </label>
                <input id="pdr_default_formula" type="text" class="text_pole" placeholder="1d20" maxlength="20" style="width:120px">
            </div>
        </div>
    </div>
</div>
